<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fix 4 Missing speaking at Triples</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
<style>
  body { font-family: system-ui; background: #0d1117; color: #e6edf3; padding: 40px; max-width: 800px; margin: 0 auto; }
  h1 { color: #58a6ff; }
  table { width: 100%; border-collapse: collapse; margin: 20px 0; }
  th, td { padding: 10px 12px; border: 1px solid #30363d; text-align: left; }
  th { background: #161b22; color: #8b949e; }
  td { background: #0d1117; }
  button { background: #3fb950; color: #fff; border: none; border-radius: 6px; padding: 12px 24px; font-size: 1rem; cursor: pointer; margin-top: 16px; }
  button:hover { background: #46d15a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { margin-top: 16px; padding: 12px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; display: none; }
  .tag { padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }
  .running { background: #1f3a5f; color: #58a6ff; }
  .done { background: #1a3a1a; color: #3fb950; }
  .error { background: #3a1a1a; color: #f85149; }
  a { color: #58a6ff; }
</style>
</head>
<body>

<h1>Fix 4 Missing <code>speaking at</code> Triples</h1>

<table>
  <thead>
    <tr><th>#</th><th>Speaker (Subject)</th><th>Predicate</th><th>Session (Object)</th></tr>
  </thead>
  <tbody>
    <tr><td>1</td><td>Justin Drake</td><td>speaking at</td><td>Quantum dilema</td></tr>
    <tr><td>2</td><td>Kaloyan Kosev</td><td>speaking at</td><td>EIP-7702 meets hardware wallets</td></tr>
    <tr><td>3</td><td>Kasra Khosravi</td><td>speaking at</td><td>Solving EVM RPC Reliability Issues</td></tr>
    <tr><td>4</td><td>Kite Liu</td><td>speaking at</td><td>Continuous Clearing Auctions</td></tr>
  </tbody>
</table>

<button id="execBtn" onclick="execute()">Connect & Create 4 Triples</button>
<div id="status"></div>

<script>
const CHAIN_ID = 1155;
const MULTIVAULT = '0x6E35cF57A41fA15eA0EaE9C33e751b01A784Fe7e';
const EXPLORER = 'https://explorer.intuition.systems';
const ABI = [
  'function getTripleCost() view returns (uint256)',
  'function createTriples(bytes32[] subjectIds, bytes32[] predicateIds, bytes32[] objectIds, uint256[] assets) payable returns (bytes32[])'
];

const PRED = '0xddbdcf95cfac2135b0dfbfa055952b839ce5ee0467a5729eb15f9df250d3cf37';

const subjects = [
  '0xbc6ede1c524cc597fe94973e7522dd4eff89380df3f2e71477c16960b5027766',  // Justin Drake
  '0xbb4046b5d498ce2e8e54a64651bed8259c0e64a2e5a34746565b68fba6f945b4',  // Kaloyan Kosev
  '0xfe22c076be133c129b09e62bad115059a7fd9cee8ee5ea069578ecb44cc93668',  // Kasra Khosravi
  '0x987ddfe48adecf3575b95f5c4d3f7cf54e6a8fed804c3378e3ad43e8bfdfb2d8',  // Kite Liu
];

const predicates = [PRED, PRED, PRED, PRED];

const objects = [
  '0x5a25d14b408e1ad97660fdbe66b826401e4116b9e6d3f5e6eb53287435ec0837',  // Quantum dilema
  '0xd60269c27c7ab6ff86a92acb594cd549843b368be73e15a5939b932217aa2e4d',  // EIP-7702 meets hardware wallets
  '0xef4654089e9d788dea40f5929b1fcefd762a8d4aecbf07243c75af95ca060d7a',  // Solving EVM RPC Reliability Issues
  '0xf0e6f1d122b6acd9e07d7fc6521c390e9a21134ac5143023145282a60984e47e',  // Continuous Clearing Auctions
];

const statusEl = document.getElementById('status');
const btn = document.getElementById('execBtn');

async function execute() {
  if (!window.ethereum) { alert('MetaMask not found'); return; }
  btn.disabled = true;
  statusEl.style.display = 'block';

  try {
    // Connect + switch chain
    statusEl.innerHTML = '<span class="tag running">Connecting wallet...</span>';
    const provider = new ethers.BrowserProvider(window.ethereum);
    provider.pollingInterval = 30000;
    await provider.send('eth_requestAccounts', []);

    try {
      await provider.send('wallet_switchEthereumChain', [{ chainId: '0x' + CHAIN_ID.toString(16) }]);
    } catch (e) {
      if (e.code === 4902) {
        await provider.send('wallet_addEthereumChain', [{
          chainId: '0x' + CHAIN_ID.toString(16),
          chainName: 'Intuition',
          rpcUrls: ['https://rpc.intuition.systems/http'],
          nativeCurrency: { name: 'TRUST', symbol: 'TRUST', decimals: 18 }
        }]);
      } else throw e;
    }

    const signer = await provider.getSigner();
    const contract = new ethers.Contract(MULTIVAULT, ABI, signer);

    // Get cost
    statusEl.innerHTML = '<span class="tag running">Getting triple cost...</span>';
    const tripleCost = await contract.getTripleCost();
    const assets = [tripleCost, tripleCost, tripleCost, tripleCost];
    const totalCost = tripleCost * 4n;

    statusEl.innerHTML = `<span class="tag running">Creating 4 triples (cost: ${parseFloat(ethers.formatEther(totalCost)).toFixed(6)} TRUST)... Confirm in MetaMask</span>`;

    const tx = await contract.createTriples(subjects, predicates, objects, assets, { value: totalCost });
    statusEl.innerHTML = `<span class="tag running">Tx sent!</span> <a href="${EXPLORER}/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,14)}...</a> Waiting for confirmation...`;

    const receipt = await tx.wait();
    statusEl.innerHTML = `<span class="tag done">Confirmed in block ${receipt.blockNumber}!</span> <a href="${EXPLORER}/tx/${tx.hash}" target="_blank">${tx.hash}</a>`;
    btn.textContent = 'Done!';

  } catch (e) {
    statusEl.innerHTML = `<span class="tag error">Error: ${e.message}</span>`;
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}
</script>
</body>
</html>
